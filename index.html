<style id="gv-style">
#gv-overlay{position:fixed;inset:0;z-index:2147483647;display:none;background:radial-gradient(ellipse at 50% 42%,rgba(255,255,255,.07),transparent 55%),rgba(0,0,0,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
#gv-overlay.gv-open{display:flex;align-items:center;justify-content:center}
#gv-stage{width:min(96vw,1640px);height:min(84vh,920px);display:grid;grid-template-columns:1fr 3.8fr 1fr;align-items:center;gap:clamp(14px,2vw,30px)}
.gv-side{display:flex;align-items:center;justify-content:center;cursor:pointer;min-width:0}
.gv-side-inner{width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#0d0d0d;opacity:.22;filter:saturate(.5) brightness(.55);transform:scale(.86);transition:opacity .26s ease,transform .26s ease,filter .26s ease;border:1px solid rgba(255,255,255,.09)}
.gv-side:hover .gv-side-inner{opacity:.58;transform:scale(.94);filter:saturate(.85) brightness(.82)}
.gv-side-inner img,.gv-side-inner video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.gv-main{position:relative;min-width:0;height:100%;overflow:hidden}
.gv-main-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;will-change:transform,opacity}
.gv-image-mask{border-radius:20px;box-shadow:0 32px 110px rgba(0,0,0,.65);max-width:min(82vw,1240px);max-height:min(82vh,860px);overflow:hidden;display:flex;align-items:center;justify-content:center}
.gv-image-mask img{max-width:min(82vw,1240px);max-height:min(82vh,860px);width:auto;height:auto;object-fit:contain;display:block;border-radius:20px}
.gv-video-mask{overflow:hidden;border-radius:20px;box-shadow:0 32px 110px rgba(0,0,0,.65);background:#000;max-width:min(82vw,1240px);max-height:min(82vh,860px)}
.gv-video-mask.is-landscape{width:min(82vw,1240px);aspect-ratio:16/9}
.gv-video-mask.is-portrait{height:min(82vh,860px);aspect-ratio:9/16}
.gv-video-mask video{width:100%;height:100%;object-fit:contain;display:block;background:#000}
@keyframes gvInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes gvInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes gvOutLeft{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes gvOutRight{from{transform:translateX(0)}to{transform:translateX(100%)}}
.gv-enter-right{animation:gvInRight .38s cubic-bezier(.32,.82,.32,1) forwards}
.gv-enter-left{animation:gvInLeft .38s cubic-bezier(.32,.82,.32,1) forwards}
.gv-exit-left{animation:gvOutLeft .38s cubic-bezier(.32,.82,.32,1) forwards}
.gv-exit-right{animation:gvOutRight .38s cubic-bezier(.32,.82,.32,1) forwards}
#gv-close{position:fixed;top:24px;right:26px;z-index:2;width:52px;height:52px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:28px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:background .2s}
#gv-close:hover{background:rgba(255,255,255,.18)}
#gv-count{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);font:700 12px/1 system-ui,sans-serif;letter-spacing:.18em;pointer-events:none}
@media(max-width:900px){#gv-stage{grid-template-columns:1fr}.gv-side{display:none}}
</style>
<script id="gv-script">
(function(){
  if(window.__gvLoaded)return;window.__gvLoaded=true;
  var items=[],idx=0,busy=false,activeVideo=null;
  var ov=document.createElement('div');ov.id='gv-overlay';
  ov.innerHTML='<button id="gv-close" type="button">×</button><div id="gv-stage"><div class="gv-side" id="gvPrev"><div class="gv-side-inner" id="gvPI"></div></div><div class="gv-main" id="gvMain"></div><div class="gv-side" id="gvNext"><div class="gv-side-inner" id="gvNI"></div></div></div><div id="gv-count"></div>';
  // body may not exist yet when script runs in <head> — defer append
  function attachOverlay(){document.body.appendChild(ov)}
  if(document.body){attachOverlay()}else{document.addEventListener('DOMContentLoaded',attachOverlay)}
  var main=ov.querySelector('#gvMain'),pi=ov.querySelector('#gvPI'),ni=ov.querySelector('#gvNI'),cnt=ov.querySelector('#gv-count');
  function src(el){return el?(el.currentSrc||el.src||el.getAttribute('src')||''):''}
  function sideMedia(item){
    if(item.type==='video'){var v=document.createElement('video');v.src=item.src;v.muted=true;v.loop=true;v.playsInline=true;v.autoplay=true;v.preload='metadata';return v}
    var i=document.createElement('img');i.src=item.src;i.alt=item.alt||'';return i
  }
  function mainMedia(item){
    if(item.type==='video'){
      var m=document.createElement('div');m.className='gv-video-mask is-landscape';
      var v=document.createElement('video');
      v.src=item.src;v.muted=false;v.loop=false;v.playsInline=true;v.autoplay=false;v.controls=true;v.preload='auto';
      v.addEventListener('loadedmetadata',function(){
        if(v.videoHeight>v.videoWidth){m.classList.replace('is-landscape','is-portrait')}
      },{once:true});
      activeVideo=v;
      m.appendChild(v);return m
    }
    activeVideo=null;
    var w=document.createElement('div');w.className='gv-image-mask';
    var i=document.createElement('img');i.src=item.src;i.alt=item.alt||'';
    w.appendChild(i);return w
  }
  function sides(){
    pi.innerHTML='';ni.innerHTML='';
    if(items.length>1){pi.appendChild(sideMedia(items[(idx-1+items.length)%items.length]));ni.appendChild(sideMedia(items[(idx+1)%items.length]))}
  }
  function renderMain(dir){
    var wrap=document.createElement('div');wrap.className='gv-main-inner';wrap.appendChild(mainMedia(items[idx]));
    if(!dir||!main.children.length){main.innerHTML='';main.appendChild(wrap);busy=false}
    else{
      var exitClass=dir==='next'?'gv-exit-left':'gv-exit-right';
      var enterClass=dir==='next'?'gv-enter-right':'gv-enter-left';
      // Clear ALL accumulated old elements to prevent multi-click bug
      Array.from(main.querySelectorAll('.gv-main-inner')).forEach(function(old){
        old.classList.remove('gv-enter-right','gv-enter-left');
        old.classList.add(exitClass);
        old.addEventListener('animationend',function(){old.remove()},{once:true})
      });
      wrap.classList.add(enterClass);
      main.appendChild(wrap);
      wrap.addEventListener('animationend',function(){wrap.classList.remove(enterClass);busy=false},{once:true})
    }
    cnt.textContent=String(idx+1).padStart(2,'0')+' / '+String(items.length).padStart(2,'0');
    sides()
  }
  function playActive(){if(!activeVideo)return;activeVideo.load();activeVideo.play().catch(function(){activeVideo.muted=true;activeVideo.play().then(function(){activeVideo.muted=false}).catch(function(){})})}
  function step(d){if(busy||items.length<=1)return;busy=true;setTimeout(function(){busy=false},700);idx=(idx+d+items.length)%items.length;renderMain(d>0?'next':'prev');playActive()}
  function open(list,start){items=list;idx=start;busy=false;ov.classList.add('gv-open');document.documentElement.style.overflow='hidden';renderMain(null);playActive()}
  function close(){ov.classList.remove('gv-open');document.documentElement.style.overflow='';main.innerHTML='';pi.innerHTML='';ni.innerHTML='';ov.querySelectorAll('video').forEach(function(v){v.pause()});busy=false}
  document.addEventListener('keydown',function(e){if(!ov.classList.contains('gv-open'))return;if(e.key==='Escape')close();if(e.key==='ArrowRight')step(1);if(e.key==='ArrowLeft')step(-1)});
  function collectSection(el){
    var scope=el.closest('.gallery-section')||el.closest('article')||document.body;
    var seen=new Set();
    return Array.from(scope.querySelectorAll('.image-button img,.project-video-wrap video')).filter(function(m){
      var s=src(m);if(!s||seen.has(s))return false;seen.add(s);
      var r=m.getBoundingClientRect();return r.width>50&&r.height>30
    }).map(function(m){return{type:m.tagName==='VIDEO'?'video':'image',src:src(m),alt:m.getAttribute('alt')||''}})
  }
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t&&t.closest('#gv-overlay')){
      if(t.closest('#gvPrev')){e.stopImmediatePropagation();step(-1);return}
      if(t.closest('#gvNext')){e.stopImmediatePropagation();step(1);return}
      if(t.closest('#gv-close')||t===ov){e.stopImmediatePropagation();close();return}
      return
    }
    // Project image / video clicks
    if(!t||t.closest('.brand-card,.case-card,.category-card'))return;
    var btn=t.closest('.image-button'),vw=t.closest('.project-video-wrap');
    if(!btn&&!vw)return;
    var m=btn?btn.querySelector('img'):vw.querySelector('video');
    if(!m)return;
    var list=collectSection(m);if(!list.length)return;
    var s=src(m),si=list.findIndex(function(x){return x.src===s});
    e.preventDefault();e.stopImmediatePropagation();
    open(list,si<0?0:si)
  },true)
})();
</script>
