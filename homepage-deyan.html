<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ERIC CHEN — PORTFOLIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; -webkit-appearance: none; }
    a { text-decoration: none; color: inherit; }
    img { display: block; }

    :root {
      --bg:    #0b0b0b;
      --fg:    #eeeeec;
      --muted: rgba(238,238,236,.38);
      --dim:   rgba(238,238,236,.15);
      --line:  rgba(238,238,236,.07);
      --hov:   rgba(238,238,236,.045);
      --sw:    240px;
      --en: 'Instrument Sans', sans-serif;
      --zh: 'Noto Sans TC', sans-serif;
    }

    html, body { height: 100%; }
    body {
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--en);
      display: flex;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    .sb {
      width: var(--sw);
      flex-shrink: 0;
      height: 100vh;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Identity */
    .sb-head {
      padding: 24px 22px 20px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .sb-name {
      display: block;
      font: 600 10.5px/1 var(--en);
      letter-spacing: .18em;
      color: var(--fg);
    }
    .sb-role {
      display: block;
      margin-top: 6px;
      font: 400 8px/1.55 var(--en);
      letter-spacing: .1em;
      color: var(--muted);
    }

    /* Category tabs */
    .sb-cats {
      padding: 16px 22px 0;
      flex-shrink: 0;
    }
    .sb-section-label {
      display: block;
      font: 500 7px/1 var(--en);
      letter-spacing: .24em;
      color: var(--dim);
      margin-bottom: 9px;
    }
    .cat-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 8px 0;
      font: 400 9px/1 var(--en);
      letter-spacing: .1em;
      color: var(--muted);
      transition: color .18s;
      text-align: left;
    }
    .cat-btn:hover { color: var(--fg); }
    .cat-btn.active { color: var(--fg); font-weight: 500; }
    .cat-n { font: 400 8px/1 var(--en); color: var(--dim); transition: color .18s; }
    .cat-btn.active .cat-n, .cat-btn:hover .cat-n { color: var(--muted); }

    /* Brand list */
    .sb-brands {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0 20px;
      scrollbar-width: none;
    }
    .sb-brands::-webkit-scrollbar { display: none; }
    .brands-label {
      display: block;
      font: 500 7px/1 var(--en);
      letter-spacing: .24em;
      color: var(--dim);
      padding: 0 22px 9px;
    }
    .brand-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 8px 22px;
      text-align: left;
      transition: background .14s;
    }
    .brand-btn:hover { background: var(--hov); }
    .brand-btn.active { background: var(--hov); }
    .brand-btn-name {
      font: 400 9px/1 var(--en);
      letter-spacing: .1em;
      color: var(--muted);
      transition: color .14s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .brand-btn:hover .brand-btn-name,
    .brand-btn.active .brand-btn-name { color: var(--fg); }
    .brand-btn-n {
      font: 400 7.5px/1 var(--en);
      color: var(--dim);
      margin-left: 8px;
      flex-shrink: 0;
    }
    .brand-btn.active .brand-btn-n { color: var(--muted); }

    /* Sidebar footer */
    .sb-foot {
      padding: 13px 22px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
    }
    .sb-foot span, .sb-foot a {
      font: 400 7.5px/1 var(--en);
      letter-spacing: .12em;
      color: var(--dim);
      transition: color .15s;
    }
    .sb-foot a:hover { color: var(--fg); }

    /* ══════════════════════════════
       MAIN STAGE
    ══════════════════════════════ */
    .stage {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }

    /* Top bar */
    .stage-bar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 22px;
      background: rgba(11,11,11,.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }
    .bar-left { display: flex; align-items: center; gap: 12px; }
    .bar-cat {
      font: 400 8.5px/1 var(--en);
      letter-spacing: .16em;
      color: var(--muted);
    }
    .bar-sep { color: var(--dim); font-size: 9px; }
    .bar-brand {
      font: 500 8.5px/1 var(--en);
      letter-spacing: .1em;
      color: var(--fg);
    }
    .bar-count {
      font: 400 8px/1 var(--en);
      letter-spacing: .1em;
      color: var(--dim);
    }
    /* back pill when brand is active */
    .back-btn {
      font: 500 7.5px/1 var(--en);
      letter-spacing: .14em;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 5px 10px;
      border-radius: 99px;
      transition: color .15s, border-color .15s;
      display: none;
    }
    .back-btn:hover { color: var(--fg); border-color: var(--muted); }
    .back-btn.visible { display: inline-flex; align-items: center; gap: 5px; }

    /* Project grid */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 2px;
    }

    /* Card */
    .card {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #141414;
      cursor: pointer;
      border: none;
      display: block;
      width: 100%;
    }
    .card:focus-visible { outline: 1px solid rgba(255,255,255,.35); }

    .card img,
    .card video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1) brightness(.85);
      transition: filter .55s ease, transform .6s ease;
      will-change: filter, transform;
    }
    .card:hover img,
    .card:hover video {
      filter: grayscale(0) brightness(1);
      transform: scale(1.04);
    }

    .card-veil {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 45%, rgba(0,0,0,.78) 100%);
      opacity: 0;
      transition: opacity .32s;
      z-index: 1;
    }
    .card:hover .card-veil { opacity: 1; }

    .card-meta {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px 14px 14px;
      z-index: 2;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .3s, transform .3s;
    }
    .card:hover .card-meta { opacity: 1; transform: none; }

    .card-brand-label {
      display: block;
      font: 500 7px/1 var(--en);
      letter-spacing: .15em;
      color: rgba(255,255,255,.48);
      margin-bottom: 4px;
    }
    .card-title {
      display: block;
      font: 500 11px/1.35 var(--zh);
      color: #fff;
    }

    .card-num {
      position: absolute;
      top: 11px; left: 12px;
      font: 500 7.5px/1 var(--en);
      letter-spacing: .12em;
      color: rgba(255,255,255,.28);
      z-index: 2;
      opacity: 0;
      transition: opacity .3s;
    }
    .card:hover .card-num { opacity: 1; }

    .card-tag {
      position: absolute;
      top: 10px; right: 10px;
      font: 500 6.5px/1 var(--en);
      letter-spacing: .18em;
      color: rgba(255,255,255,.48);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
      padding: 4px 8px;
      border-radius: 99px;
      z-index: 2;
    }

    .stage-empty {
      padding: 100px 22px;
      text-align: center;
      font: 400 9px/1 var(--en);
      letter-spacing: .18em;
      color: var(--dim);
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-head">
      <span class="sb-name">ERIC CHEN</span>
      <span class="sb-role">SPATIAL DESIGNER · ART DIRECTOR<br>TAIPEI, TAIWAN</span>
    </div>

    <div class="sb-cats">
      <span class="sb-section-label">WORK</span>
      <button class="cat-btn active" data-cat="ai">GENERATIVE CREATIVE <span class="cat-n" id="n-ai"></span></button>
      <button class="cat-btn" data-cat="activity">EVENT &amp; ACTIVATION <span class="cat-n" id="n-activity"></span></button>
      <button class="cat-btn" data-cat="exhibition">SPATIAL EXPERIENCE <span class="cat-n" id="n-exhibition"></span></button>
      <button class="cat-btn" data-cat="graphic">KEY VISUAL <span class="cat-n" id="n-graphic"></span></button>
    </div>

    <div class="sb-brands">
      <span class="brands-label" id="brandsLabel">BRANDS</span>
      <div id="brandList"></div>
    </div>

    <div class="sb-foot">
      <span>© 2026</span>
      <a href="mailto:eric61003@me.com">CONTACT ↗</a>
    </div>
  </aside>

  <!-- STAGE -->
  <main class="stage">
    <div class="stage-bar">
      <div class="bar-left">
        <span class="bar-cat" id="barCat">GENERATIVE CREATIVE</span>
        <span class="bar-sep" id="barSep" style="display:none">·</span>
        <span class="bar-brand" id="barBrand"></span>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <button class="back-btn" id="backBtn" onclick="clearBrand()">← ALL</button>
        <span class="bar-count" id="barCount"></span>
      </div>
    </div>
    <div class="proj-grid" id="projGrid"></div>
    <div class="stage-empty" id="stageEmpty" style="display:none">COMING SOON</div>
  </main>

  <script>
  // ════════════════════════════════════════
  // Data (brand-organised)
  // ════════════════════════════════════════
  const C = (title, cover, year, isVideo = false) => ({ title, cover, year, isVideo });
  const B = (name, cases) => ({ name, cases });

  const DATA = {
    ai: {
      label: 'GENERATIVE CREATIVE',
      brands: [
        B('IMPERIAL TOBACCO', [C('帝國冒險島｜企業激勵競賽', 'assets/projects/itg-ai/video/0204-bilingual.mp4', '2026', true)]),
        B('HAVAS',            [C('HAVAS 年度尾牙 AI 影片', 'assets/projects/havas-ai/video/main.mp4', '2026', true)]),
        B('MEDIATEK',         [C('聯發科 AI 動態視覺', 'assets/projects/mediatek-ai/video/1216.mp4', '2025', true)]),
        B('GSK',              [C('GSK TJCC 上市發表動態視覺', 'assets/projects/gsk-ai/video/interactive.mp4', '2026', true)]),
        B('AI VISUAL STUDIES',[C('2026 AI 提案視覺研究', 'assets/projects/ai-proposal-studies/video/2.mp4', '2026', true)]),
      ]
    },
    activity: {
      label: 'EVENT & ACTIVATION',
      brands: [
        B('GUCCI',          [C('Gucci Ancora', 'assets/projects/gucci-ancora/cover/1.jpg', '2024'),
                             C('Gucci High Jewelry', 'assets/projects/gucci-hj/live/4.jpg', '2023'),
                             C('Gucci Love Parade', 'assets/projects/gucci-love/live/1.jpg', '2022')]),
        B('LOUIS VUITTON',  [C('Exotic Leather Presentation', 'assets/projects/lv-exotic/live/1.jpg', '2023')]),
        B('BVLGARI',        [C('BVLGARI Gala Dinner', 'assets/projects/bvlgari-gala/cover/1.jpg', '2023'),
                             C('BVLGARI Trunk Show', 'assets/projects/bvlgari-trunk/cover/1.jpg', '2021')]),
        B('DIOR',           [C('RoseDior High Jewelry Event', 'assets/projects/dior-rose/cover/1.jpg', '2021')]),
        B('VOLKSWAGEN',     [C('Golf GTI Edition 50 Launch', 'assets/projects/vw-gti/live/1.jpg', '2026'),
                             C('Golf Launch Event', 'assets/projects/vw-golf/live/1.jpg', '2025'),
                             C('Passat Launch Event', 'assets/projects/vw-passat/live/1.jpg', '2025')]),
        B('MEDIATEK',       [C('AI Without Limits — Computex Preview', 'assets/projects/mediatek-preview/live/1.jpg', '2026')]),
        B('WHITEOUT SURVIVAL',[C('Dadaocheng 品牌活動', 'assets/projects/frostpunk-dadaocheng/live/1.jpg', '2025')]),
        B('FERRAGAMO',      [C('Ferragamo Pop-up', 'assets/projects/ferragamo-popup/cover/1.jpg', '2021')]),
        B('BOTTEGA VENETA', [C('Bottega Veneta Pop-up', 'assets/projects/bottega/live/1.jpg', '2023')]),
        B('DELVAUX',        [C('Delvaux Pop-up', 'assets/projects/delvaux/cover/1.jpg', '2020')]),
        B('CASETiFY',       [C('CASETiFY 南西門市', 'assets/projects/casetify-nanxi/live/1.jpg', '2023')]),
        B('PANDORA',        [C('Pandora Dream Mall Counter', 'assets/projects/pandora-dream/live/1.jpg', '2021'),
                             C('Pandora E-DA Pop-up', 'assets/projects/pandora-edapark/live/1.jpg', '2021')]),
        B('HBL',            [C('HBL 30週年活動', 'assets/projects/hbl-30/cover/1.jpg', '2017')]),
        B('HEINEKEN',       [C('Heineken 中秋活動', 'assets/projects/heineken-bbq/live/1.jpg', '2022')]),
      ]
    },
    exhibition: {
      label: 'SPATIAL EXPERIENCE',
      brands: [
        B('ORAL-B',   [C('2025 牙科醫學會展台', 'assets/projects/oralb/live/1.jpg', '2025'),
                       C('2024 牙科醫學會展台', 'assets/projects/oralb-2/live/1.jpg', '2024'),
                       C('2017 牙科醫學會展台', 'assets/projects/oralb-2017/live/1.jpg', '2017'),
                       C('2017 春季牙科醫學會', 'assets/projects/oralb-2017-spring/live/1.jpg', '2017')]),
        B('GSK',      [C('TJCC 年會展台', 'assets/projects/gsk-tjcc/render/1.jpg', '2026')]),
        B('MEDIATEK', [C('MediaTek Computex 2026', 'assets/projects/mediatek/render/1.jpg', '2026')]),
        B('INFINITI', [C('INFINITI 車展展台空間設計', 'assets/projects/infiniti/cover/1.jpg', '2020')]),
        B('MASERATI', [C('Maserati 車展展台空間設計', 'assets/projects/maserati/cover/1.jpg', '2018')]),
        B('STARLUX',  [C('STARLUX ITF 沉浸式展館', 'assets/projects/starlux-itf/render/1.jpg', '2025')]),
        B('WHITEOUT SURVIVAL',[C('電玩展覽沉浸空間', 'assets/projects/frostpunk/live/1.jpg', '2024')]),
        B('GILEAD',   [C('Gilead 女性醫學年會展台', 'assets/projects/tmwa/live/1.jpg', '2022'),
                       C('U=U HIV 意識倡議展覽', 'assets/projects/emergency/live/1.jpg', '2022')]),
        B('WINE EXPO',[C('台北葡萄酒博覽會展台', 'assets/projects/wine-expo/cover/1.jpg', '2018')]),
      ]
    },
    graphic: {
      label: 'KEY VISUAL & CAMPAIGN',
      brands: [
        B('STARLUX',          [C('星宇航空 Campaign 主視覺系統', 'assets/projects/graphic-starlux-kv/render/1.jpg', '2025')]),
        B('IMPERIAL TOBACCO', [C('帝國菸草 AI 活動視覺體系', 'assets/projects/graphic-itg/render/1.jpg', '2026')]),
        B('ORAL-B',           [C('Oral-B 2024 Campaign 視覺設計', 'assets/projects/graphic-oralb-2024/render/1.jpg', '2024')]),
        B('ACER',             [C('Acer Go 活動主視覺系統', 'assets/projects/graphic-toys-taste/render/1.jpg', '2024')]),
        B('ESSENCE',          [C('Essence 信義旗艦空間標示設計', 'assets/projects/graphic-essence-signage/render/1.jpg', '2024')]),
      ]
    }
  };

  // ════════════════════════════════════════
  // State
  // ════════════════════════════════════════
  let activeCat   = 'ai';
  let activeBrand = null; // brand name string or null

  // ════════════════════════════════════════
  // Helpers
  // ════════════════════════════════════════
  function allCases(catId) {
    return DATA[catId].brands.flatMap(b =>
      b.cases.map(c => ({ ...c, brandName: b.name }))
    );
  }

  function brandCases(catId, brandName) {
    const b = DATA[catId].brands.find(br => br.name === brandName);
    return b ? b.cases.map(c => ({ ...c, brandName: b.name })) : [];
  }

  // ════════════════════════════════════════
  // Render sidebar brands
  // ════════════════════════════════════════
  function renderBrands(catId) {
    const { brands } = DATA[catId];
    document.getElementById('brandList').innerHTML = brands.map(b =>
      `<button class="brand-btn${activeBrand === b.name ? ' active' : ''}"
               data-brand="${b.name}">
        <span class="brand-btn-name">${b.name}</span>
        <span class="brand-btn-n">${b.cases.length}</span>
      </button>`
    ).join('');
    document.querySelectorAll('.brand-btn').forEach(btn => {
      btn.addEventListener('click', () => selectBrand(btn.dataset.brand));
    });
  }

  // ════════════════════════════════════════
  // Render project grid
  // ════════════════════════════════════════
  function renderGrid(cases) {
    const isAi = activeCat === 'ai';
    const grid = document.getElementById('projGrid');
    const empty = document.getElementById('stageEmpty');

    if (!cases.length) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = cases.map((c, i) => {
      const media = c.isVideo
        ? `<video src="${c.cover}" muted autoplay loop playsinline preload="metadata"></video>`
        : `<img src="${c.cover}" alt="" loading="lazy">`;
      const tag = isAi ? `<span class="card-tag">AI · VIDEO</span>` : '';
      return `<button class="card" aria-label="${c.title}">
        ${media}
        <div class="card-veil"></div>
        <span class="card-num">${String(i + 1).padStart(3, '0')}</span>
        ${tag}
        <div class="card-meta">
          <span class="card-brand-label">${c.brandName}</span>
          <span class="card-title">${c.title}</span>
        </div>
      </button>`;
    }).join('');
  }

  // ════════════════════════════════════════
  // Update top bar
  // ════════════════════════════════════════
  function updateBar(count) {
    const cat = DATA[activeCat];
    document.getElementById('barCat').textContent = cat.label;
    const sep = document.getElementById('barSep');
    const brandEl = document.getElementById('barBrand');
    const backBtn = document.getElementById('backBtn');

    if (activeBrand) {
      sep.style.display = 'inline';
      brandEl.textContent = activeBrand;
      backBtn.classList.add('visible');
    } else {
      sep.style.display = 'none';
      brandEl.textContent = '';
      backBtn.classList.remove('visible');
    }
    document.getElementById('barCount').textContent =
      count + ' PROJECT' + (count !== 1 ? 'S' : '');
  }

  // ════════════════════════════════════════
  // Actions
  // ════════════════════════════════════════
  function selectBrand(name) {
    // Toggle off if already active
    if (activeBrand === name) { clearBrand(); return; }
    activeBrand = name;
    const cases = brandCases(activeCat, name);
    renderBrands(activeCat);
    renderGrid(cases);
    updateBar(cases.length);
    document.querySelector('.stage').scrollTop = 0;
  }

  function clearBrand() {
    activeBrand = null;
    const cases = allCases(activeCat);
    renderBrands(activeCat);
    renderGrid(cases);
    updateBar(cases.length);
    document.querySelector('.stage').scrollTop = 0;
  }

  function switchCat(catId) {
    activeCat   = catId;
    activeBrand = null;
    document.querySelectorAll('.cat-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.cat === catId)
    );
    document.querySelector('.sb-brands').scrollTop = 0;
    document.querySelector('.stage').scrollTop = 0;
    const cases = allCases(catId);
    renderBrands(catId);
    renderGrid(cases);
    updateBar(cases.length);
  }

  // ════════════════════════════════════════
  // Init
  // ════════════════════════════════════════
  // Count badges
  Object.keys(DATA).forEach(catId => {
    const el = document.getElementById(`n-${catId}`);
    const total = DATA[catId].brands.reduce((s, b) => s + b.cases.length, 0);
    if (el) el.textContent = `(${total})`;
  });

  // Category click
  document.querySelectorAll('.cat-btn').forEach(btn =>
    btn.addEventListener('click', () => switchCat(btn.dataset.cat))
  );

  switchCat('ai');
  </script>
</body>
</html>
